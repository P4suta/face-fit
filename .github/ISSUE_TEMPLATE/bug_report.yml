name: Bug report
description: Report a problem
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The command you ran (and, if possible, the input image traits)
      placeholder: |
        1. uv run face-fit ... -o ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version info
      description: OS / Python / face-fit version
      placeholder: "Windows 11 / Python 3.13 / face-fit 0.1.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
