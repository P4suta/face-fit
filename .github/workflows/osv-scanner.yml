# OSV-Scanner: checks the resolved dependency set (uv.lock) against the OSV.dev
# vulnerability database. Accepted/unfixable advisories go in osv-scanner.toml
# (the single documented escape hatch). Findings surface under Security > Code
# scanning via the reusable workflow's SARIF upload.
name: osv-scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1" # Mondays, offset from codeql/scorecard

permissions:
  contents: read

jobs:
  scan:
    permissions:
      security-events: write # upload SARIF to code scanning
      contents: read # checkout
      actions: read # read workflow metadata
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=uv.lock
