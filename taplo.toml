# TOML formatting policy (taplo), enforced repo-wide via `taplo fmt --check`
# (see justfile / lefthook / CI). Validity alone (`taplo check`) is not enough —
# formatting is part of the convention.

# taplo does not honor .gitignore, so exclude generated/vendored trees explicitly.
exclude = [".nox/**", ".venv/**", "site/**", "htmlcov/**", "**/site-packages/**"]

[formatting]
align_comments = false # keep trailing comments one space after the value
column_width = 100
indent_string = "    " # four spaces — matches the existing pyproject.toml style
reorder_keys = false # key order is semantically meaningful
reorder_arrays = false
array_auto_collapse = false # keep intentionally-multiline arrays expanded
